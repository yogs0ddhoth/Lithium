[project]
name = "xml-pydantic"
version = "0.1.0"
description = "XML ↔ JSON Schema ↔ Pydantic model bridge"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "datamodel-code-generator[ruff]>=0.55.0",
    "xmltodict>=1.0.4",
]

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["py.typed"]

[dependency-groups]
dev = [
    "deepdiff>=8.6.2",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests/"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=xml_pydantic",
    "--cov-report=term-missing",
]
